# Application Name
spring.application.name=DocumentOrganiser-Backend

# Default Profile
spring.profiles.default=dev

# Server Configuration
server.port=8080
server.servlet.context-path=/api/v1

# Application URLs
app.base-url=${APP_BASE_URL:http://localhost:8080/api/v1}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:3000}

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

# Proxy Awareness
server.forward-headers-strategy=framework

# Logging Configuration
logging.level.root=INFO
logging.level.com.alphadocuments=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha


management.health.redis.enabled=false

# Rate Limiting
rate-limit.enabled=true
rate-limit.storage=in-memory
rate-limit.auth-limit=20
rate-limit.upload-limit=30
rate-limit.general-limit=120
rate-limit.window-ms=60000
rate-limit.cleanup-interval-ms=300000
